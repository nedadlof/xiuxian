<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>修仙宗门放置游戏原型</title>
    <link rel="stylesheet" href="./styles/theme.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      const root = document.getElementById('app');

      const showBootstrapError = (error) => {
        if (!root) return;
        const message = error instanceof Error ? (error.stack || error.message) : String(error);
        root.innerHTML = `
          <div class="panel">
            <div class="panel-title">
              <h3>页面启动失败</h3>
              <span class="tag">已拦截启动异常</span>
            </div>
            <pre id="bootstrap-error" style="white-space:pre-wrap;word-break:break-word;margin:0;"></pre>
          </div>
        `;
        const pre = document.getElementById('bootstrap-error');
        if (pre) {
          pre.textContent = message;
        }
      };

      import('./src/main.js?v=20260313-ui-refresh-2').catch((error) => {
        console.error(error);
        showBootstrapError(error);
      });
    </script>
  </body>
</html>
